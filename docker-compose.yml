services:
  app:
    build: .
    image: cope-integration-samples
    ports:
      - "4000:4000"
    environment:
      # Pick one of: prod | stg | qa | dpa. Overrides the default URL bases.
      COPE_ENV: ${COPE_ENV:-stg}
      # Public-safe keys (browser sees them).
      COPE_PUBLISHABLE_KEY: ${COPE_PUBLISHABLE_KEY}
      COPE_PRODUCT_UUID: ${COPE_PRODUCT_UUID}
      COPE_DEFAULT_CURRENCY: ${COPE_DEFAULT_CURRENCY:-EUR}
      # Server-side secret for webhook HMAC verification.
      COPE_WEBHOOK_SECRET: ${COPE_WEBHOOK_SECRET}
      # Where this app is reachable from the public internet — used to build
      # success_url, cancel_url, and the value you give COPE as the webhook
      # endpoint. Use https://your-tunnel.example for local testing.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:4000}
    restart: unless-stopped
